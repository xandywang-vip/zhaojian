<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1" />
    <title>理理 · 换个角度看自己</title>
    <meta name="description" content="心里转了很久的事，换个角度理一理。" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- 异步加载字体，避免网络屏蔽时阻塞页面渲染 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Ma+Shan+Zheng&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Ma+Shan+Zheng&display=swap" rel="stylesheet"></noscript>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
    <!-- 临时错误捕获，排查空白屏原因 -->
    <script>
      window.addEventListener('error', function(e) {
        if (document.getElementById('app').childElementCount === 0) {
          document.getElementById('app').innerHTML =
            '<div style="padding:40px;font-size:13px;color:#c00;font-family:monospace;white-space:pre-wrap">JS Error:\n' + e.message + '\n' + (e.filename || '') + ':' + e.lineno + '</div>';
        }
      });
      window.addEventListener('unhandledrejection', function(e) {
        if (document.getElementById('app').childElementCount === 0) {
          document.getElementById('app').innerHTML =
            '<div style="padding:40px;font-size:13px;color:#c00;font-family:monospace;white-space:pre-wrap">Unhandled:\n' + (e.reason && e.reason.message ? e.reason.message : String(e.reason)) + '</div>';
        }
      });
    </script>
  </body>
</html>
